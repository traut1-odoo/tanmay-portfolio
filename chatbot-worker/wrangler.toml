name = "tanmay-portfolio-chatbot"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Load .md files as text strings (used for context.generated.md)
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Public vars — readable to the Worker as env.ALLOWED_ORIGIN
[vars]
ALLOWED_ORIGIN = "https://tanmayrautheckler.github.io,https://tanmay-portfolio-pied.vercel.app"

# Secrets (set via wrangler CLI, NEVER commit):
#   wrangler secret put ANTHROPIC_API_KEY
